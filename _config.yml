title: Eissa Lab
tagline: Cognition · Computation · Neuroscience
description: >-
  The Eissa Lab studies how we learn and adapt our decision-making strategies
  to different environments, combining crowdsourced behavior, computational
  modeling, and human brain recordings.
# Served at the standard GitHub Pages project path:
#   https://bamr87.github.io/eissalab.com/
# (Local dev stays at root — the Docker serve command overrides baseurl to "".)
url: "https://bamr87.github.io"
baseurl: "/eissalab.com"

# Theme / rendering
markdown: kramdown
highlighter: rouge
permalink: pretty

# Collections
collections:
  members:
    output: true
    permalink: /people/:name/

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: members
    values:
      layout: member

# Build
exclude:
  - Gemfile
  - Gemfile.lock
  - Dockerfile
  - docker-compose.yml
  - vendor/
  - .jekyll-cache/
  - CLAUDE.md
  - EDITING.md
  - node_modules/
