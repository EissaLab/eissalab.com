title: Eissa Lab
tagline: Cognition · Computation · Neuroscience
description: >-
  The Eissa Lab studies how we learn and adapt our decision-making strategies
  to different environments, combining crowdsourced behavior, computational
  modeling, and human brain recordings.
# Served at the custom apex domain (see the CNAME file):
#   https://eissalab.com/
# baseurl is empty because the apex domain serves the site at root.
url: "https://eissalab.com"
baseurl: ""

# Theme / rendering
markdown: kramdown
highlighter: rouge
permalink: pretty

# Collections
collections:
  members:
    output: true
    permalink: /people/:name/
  research:
    output: true
    permalink: /research/:name/

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: members
    values:
      layout: member
  - scope:
      path: ""
      type: research
    values:
      layout: research

# Build
exclude:
  - Gemfile
  - Gemfile.lock
  - Dockerfile
  - docker-compose.yml
  - vendor/
  - .jekyll-cache/
  - CLAUDE.md
  - EDITING.md
  - node_modules/
