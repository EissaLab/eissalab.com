name: Deploy Jekyll site to Pages

on:
  # Build on every push to the default branch
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions needed to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production run
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'        # matches Dockerfile (ruby:3.1)
          bundler-cache: true        # bundle install + cache gems

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        # url/baseurl come from _config.yml (apex domain eissalab.com, empty
        # baseurl); the CNAME file at repo root is copied into the artifact and
        # tells GitHub Pages to serve the site at the custom domain.
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
